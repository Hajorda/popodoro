name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Disable code signing so the build works on CI without Apple certificates.
      # The resulting .app is unsigned — it can be run locally after right-clicking
      # "Open" to bypass Gatekeeper. For notarized/App Store builds, see the
      # "Signed distribution" section in README.
      - name: Disable code signing for CI
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :com.apple.security.app-sandbox false" \
            macos/Runner/Release.entitlements
          ruby -e "
            f = 'macos/Runner.xcodeproj/project.pbxproj'
            c = File.read(f)
            c.gsub!(/CODE_SIGN_STYLE = Automatic;/, 'CODE_SIGN_STYLE = Manual;')
            c.gsub!(/DEVELOPMENT_TEAM = \S+;/, 'DEVELOPMENT_TEAM = ;')
            File.write(f, c)
          "

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/popodoro-macos.zip" popodoro.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: popodoro-macos
          path: popodoro-macos.zip
          retention-days: 14

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # inno_bundle references unofficial Inno Setup language files (e.g. Icelandic)
      # that are not included in the pre-installed copy on windows-latest runners.
      # Download them directly from the Inno Setup source repo.
      - name: Download missing Inno Setup language files
        shell: pwsh
        run: |
          $unofficialLangs = @(
            "Basque", "Belarusian", "Croatian", "Esperanto",
            "Galician", "Georgian", "Icelandic", "Macedonian",
            "Malay", "Maltese", "Punjabi", "Tamil", "Urdu", "Vietnamese"
          )
          $base = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial"
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages"
          foreach ($lang in $unofficialLangs) {
            try {
              Invoke-WebRequest -Uri "$base/$lang.isl" -OutFile "$dest\$lang.isl" -ErrorAction Stop
              Write-Host "✓ $lang.isl"
            } catch {
              Write-Host "⚠ $lang.isl not found upstream (skipping)"
            }
          }

      # inno_bundle drives flutter build windows internally, then wraps the
      # output into a self-contained Inno Setup installer (.exe).
      - name: Build Windows installer
        run: dart run inno_bundle --release

      - name: Find installer output
        shell: pwsh
        run: Get-ChildItem -Path build\windows\x64\installer -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: popodoro-windows
          path: build/windows/x64/installer/**/*.exe
          retention-days: 14

  # ── GitHub Release (tag pushes only) ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: popodoro-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: popodoro-windows

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            popodoro-macos.zip
            popodoro-*-windows-installer.exe
          generate_release_notes: true
