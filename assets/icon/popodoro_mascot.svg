<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -14 104 124" width="520" height="620">
  <!--
    Popodoro mascot — "hi" mood
    Translated 1:1 from PopMascot CustomPainter (pop_mascot.dart).
    Coordinate space: 0 0 100 100 (matches Flutter s.width/s.height fractions).
    All shapes are true vectors — import into Figma, resize freely.

    Colours (light mode):
      accent / body : #FFC857  (pop)
      bump fill     : #FFF6E1  (bump)
      bump edge     : #F2E6C6  (bumpEdge)
      ink           : #1C1A17
      cheek         : #F26B4F @ 32 %
  -->
  <defs>
    <!-- ── Bump gradients (white top → cream → beige) ── -->
    <linearGradient id="g-bump-L" x1="0" y1="-2"  x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="65%"  stop-color="#fff6e1"/>
      <stop offset="100%" stop-color="#f2e6c6"/>
    </linearGradient>
    <linearGradient id="g-bump-C" x1="0" y1="-10" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="65%"  stop-color="#fff6e1"/>
      <stop offset="100%" stop-color="#f2e6c6"/>
    </linearGradient>
    <linearGradient id="g-bump-R" x1="0" y1="-2"  x2="0" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="65%"  stop-color="#fff6e1"/>
      <stop offset="100%" stop-color="#f2e6c6"/>
    </linearGradient>

    <!-- ── Body gradient (lighter top → mid → darker bottom) ── -->
    <linearGradient id="g-body" x1="0" y1="18" x2="0" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffd676"/>
      <stop offset="60%"  stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#ffc439"/>
    </linearGradient>

    <!-- ── Filters ── -->
    <filter id="f-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="f-cheek" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════
       1. Drop shadow (blurred ellipse under body)
       drawOval: Rect(14, 94, 72, 8), color=#1C1A17 @ 10%, blur=3
  ═══════════════════════════════════════════════ -->
  <ellipse cx="50" cy="98" rx="36" ry="4"
    fill="#1c1a17" fill-opacity="0.10" filter="url(#f-shadow)"/>

  <!-- ═══════════════════════════════════════════════
       2. Popcorn bumps (hat tufts)
       RRect corners: topLR=(w×0.50, h×0.60)  bottomLR=(w×0.46, h×0.40)
       Since rx_tl+rx_tr = w, the top becomes a full arch (no flat top edge).
       Since ry_tl+ry_bl = h, the sides are also full arcs (no flat sides).
  ═══════════════════════════════════════════════ -->

  <!-- Left  (x=14, y=−2, w=34, h=34) -->
  <path d="
    M 31,-2
    A 17,20.4   0 0 1 48,18.4
    A 15.64,13.6 0 0 1 32.36,32
    L 29.64,32
    A 15.64,13.6 0 0 1 14,18.4
    A 17,20.4   0 0 1 31,-2
    Z"
    fill="url(#g-bump-L)"/>

  <!-- Center (x=36, y=−10, w=36, h=36) -->
  <path d="
    M 54,-10
    A 18,21.6    0 0 1 72,11.6
    A 16.56,14.4 0 0 1 55.44,26
    L 52.56,26
    A 16.56,14.4 0 0 1 36,11.6
    A 18,21.6    0 0 1 54,-10
    Z"
    fill="url(#g-bump-C)"/>

  <!-- Right  (x=58, y=−2, w=30, h=30) -->
  <path d="
    M 73,-2
    A 15,18    0 0 1 88,16
    A 13.8,12  0 0 1 74.2,28
    L 71.8,28
    A 13.8,12  0 0 1 58,16
    A 15,18    0 0 1 73,-2
    Z"
    fill="url(#g-bump-R)"/>

  <!-- ═══════════════════════════════════════════════
       3. Body (squircle)
       Rect(6, 18, 88, 78)
       Corners: topLR=(33.44, 34.32)  bottomLR=(36.96, 35.88)
  ═══════════════════════════════════════════════ -->
  <path d="
    M 39.44,18
    L 60.56,18
    A 33.44,34.32 0 0 1 94,52.32
    L 94,60.12
    A 36.96,35.88 0 0 1 57.04,96
    L 42.96,96
    A 36.96,35.88 0 0 1 6,60.12
    L 6,52.32
    A 33.44,34.32 0 0 1 39.44,18
    Z"
    fill="url(#g-body)"/>

  <!-- Body bottom inset crease — drawLine at y=91.5, x 21.84→78.16, w=5.5 -->
  <line x1="21.84" y1="91.5" x2="78.16" y2="91.5"
    stroke="#ffc02e" stroke-width="5.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════
       4. Cheek blush
       Left  : Rect(12, 55, 14, 9)   →  cx=19, cy=59.5, rx=7, ry=4.5
       Right : Rect(74, 55, 14, 9)   →  cx=81, cy=59.5
  ═══════════════════════════════════════════════ -->
  <ellipse cx="19" cy="59.5" rx="7" ry="4.5"
    fill="#f26b4f" fill-opacity="0.32" filter="url(#f-cheek)"/>
  <ellipse cx="81" cy="59.5" rx="7" ry="4.5"
    fill="#f26b4f" fill-opacity="0.32" filter="url(#f-cheek)"/>

  <!-- ═══════════════════════════════════════════════
       5. Arms  (hi mood — rotate ±15°)
       Left  : center (6, 63), size 14×10, rotate +15°
       Right : center (94, 63), size 14×10, rotate −15°
       Corner radii: left/bottomLeft=w×0.4=5.6  right/bottomRight=w×0.6=8.4
       Arm colour: _darken(#FFC857, 0.08) ≈ #FFC02E
  ═══════════════════════════════════════════════ -->
  <g transform="translate(6,63) rotate(15)">
    <path d="
      M -1.4,-5
      L  1.4,-5
      A  8.4,5 0 0 1 7,0
      A  8.4,5 0 0 1  1.4,5
      L -1.4,5
      A  5.6,5 0 0 1 -7,0
      A  5.6,5 0 0 1 -1.4,-5
      Z" fill="#ffc02e"/>
  </g>
  <g transform="translate(94,63) rotate(-15)">
    <path d="
      M -1.4,-5
      L  1.4,-5
      A  8.4,5 0 0 1 7,0
      A  8.4,5 0 0 1  1.4,5
      L -1.4,5
      A  5.6,5 0 0 1 -7,0
      A  5.6,5 0 0 1 -1.4,-5
      Z" fill="#ffc02e"/>
  </g>

  <!-- ═══════════════════════════════════════════════
       6. Eyes  (hi / working — open oval + sparkle)
       Left  eye : Rect(32, 48, 10, 12)  → cx=37, cy=54, rx=5, ry=6
       Left  sparkle : Rect(33.8, 50.16, 3.4, 4.08) → cx=35.5, cy=52.2, rx=1.7, ry=2.04
       Right eye : Rect(60, 48, 10, 12)  → cx=65, cy=54
       Right sparkle : Rect(61.8, 50.16 …) → cx=63.5, cy=52.2
  ═══════════════════════════════════════════════ -->
  <ellipse cx="37"   cy="54"   rx="5"   ry="6"    fill="#1c1a17"/>
  <ellipse cx="35.5" cy="52.2" rx="1.7" ry="2.04" fill="#ffffff"/>
  <ellipse cx="65"   cy="54"   rx="5"   ry="6"    fill="#1c1a17"/>
  <ellipse cx="63.5" cy="52.2" rx="1.7" ry="2.04" fill="#ffffff"/>

  <!-- ═══════════════════════════════════════════════
       7. Mouth  (hi / working — gentle smile arc)
       Arc rect: Rect(42, 68, 16, 8), startAngle=0, sweep=π (bottom half)
       → from (58, 72) curving down to (42, 72)
  ═══════════════════════════════════════════════ -->
  <path d="M 58,72 A 8,4 0 0 1 42,72"
    stroke="#1c1a17" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
